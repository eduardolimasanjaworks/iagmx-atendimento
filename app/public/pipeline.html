<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de etapas - IA GMX</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, #f1f5f9 100%);
      color: #132033;
      min-height: 100vh;
      padding: 1.25rem;
    }
    a { color: #2563eb; }
    header {
      max-width: 960px;
      margin: 0 auto 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      justify-content: space-between;
    }
    h1 { font-size: 1.35rem; }
    .sub { color: #62748b; font-size: .875rem; margin-top: .25rem; }
    input {
      background: #f8fbff;
      border: 1px solid #d7e0ee;
      border-radius: 8px;
      color: #132033;
      padding: .55rem .75rem;
      font-size: .875rem;
      min-width: 200px;
    }
    button {
      background: #3b82f6;
      color: #fff;
      border: none;
      padding: .55rem 1rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #2563eb; }
    .lista { max-width: 960px; margin: 0 auto; display: flex; flex-direction: column; gap: .75rem; }
    .card {
      background: rgba(255,255,255,.94);
      border: 1px solid #d7e0ee;
      border-radius: 10px;
      padding: 1rem 1.1rem;
      cursor: pointer;
      transition: border-color .15s;
      box-shadow: 0 12px 30px rgba(15,23,42,.06);
    }
    .card:hover, .card.ativo { border-color: #3b82f6; }
    .card-top {
      display: flex;
      justify-content: space-between;
      gap: .75rem;
      flex-wrap: wrap;
      margin-bottom: .5rem;
    }
    .tel { font-weight: 600; color: #132033; }
    .badge {
      font-size: .75rem;
      padding: .15rem .5rem;
      border-radius: 999px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge.ok { background: #dcfce7; color: #166534; }
    .badge.processando { background: #dbeafe; color: #1d4ed8; }
    .badge.enfileirado { background: #fef3c7; color: #92400e; }
    .badge.erro { background: #fee2e2; color: #b91c1c; }
    .badge.silencio { background: #eef3fb; color: #62748b; }
    .entrada { font-size: .875rem; color: #62748b; margin-bottom: .75rem; word-break: break-word; }
    .etapas { border-left: 2px solid #d7e0ee; margin-left: .35rem; padding-left: .85rem; }
    .etapa { margin-bottom: .65rem; position: relative; }
    .etapa::before {
      content: '';
      position: absolute;
      left: -1.05rem;
      top: .45rem;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3b82f6;
    }
    .etapa-titulo { font-size: .875rem; font-weight: 600; color: #132033; }
    .etapa-meta { font-size: .75rem; color: #62748b; }
    .etapa-detalhe {
      font-size: .75rem;
      color: #62748b;
      margin-top: .2rem;
      font-family: ui-monospace, monospace;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .resposta {
      margin-top: .75rem;
      padding: .65rem .75rem;
      background: #f8fbff;
      border-radius: 8px;
      font-size: .875rem;
      color: #15803d;
    }
    #status { max-width: 960px; margin: 0 auto 1rem; font-size: .875rem; color: #62748b; }
    .vazio { text-align: center; color: #62748b; padding: 3rem 1rem; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Painel de etapas das conversas</h1>
      <p class="sub">Veja como cada conversa passa pelas etapas internas antes da resposta final</p>
    </div>
    <div class="top-actions" style="display:flex;gap:.5rem;flex-wrap:wrap;align-items:center">
      <button type="button" id="atualizar">Atualizar</button>
      <a href="/">← Config</a>
    </div>
  </header>
  <div id="status">Carregando...</div>
  <div class="lista" id="lista"></div>

  <script src="/painel-auth.js"></script>
  <script>
    const listaEl = document.getElementById('lista');
    const statusEl = document.getElementById('status');
    const atualizarBtn = document.getElementById('atualizar');
    let expandido = null;
    let pollTimer = null;

    function pararAutoAtualizacao() {
      if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
    }

    function iniciarAutoAtualizacao() {
      if (!pollTimer) {
        pollTimer = setInterval(carregar, 2000);
      }
    }

    function badgeClass(s) {
      if (s === 'ok') return 'ok';
      if (s === 'processando' || s === 'enfileirado') return s;
      if (s === 'erro') return 'erro';
      return 'silencio';
    }

    function fmtMs(ms) {
      if (ms == null) return '';
      return ms < 1000 ? `${ms}ms` : `${(ms / 1000).toFixed(1)}s`;
    }

    function renderTrace(t, aberto) {
      const dur = t.fimMs ? t.fimMs - t.inicioMs : Date.now() - t.inicioMs;
      const etapasHtml = aberto
        ? `<div class="etapas">${t.etapas.map((e) => `
            <div class="etapa">
              <div class="etapa-titulo">${e.rotulo}</div>
              <div class="etapa-meta">${e.etapa}${e.duracaoMs != null ? ' · ' + fmtMs(e.duracaoMs) : ''}</div>
              ${e.detalhe ? `<div class="etapa-detalhe">${JSON.stringify(e.detalhe, null, 0)}</div>` : ''}
            </div>`).join('')}</div>
          ${t.resposta ? `<div class="resposta">→ ${t.resposta}</div>` : ''}
          ${t.erro ? `<div class="resposta" style="color:#f87171">Erro: ${t.erro}</div>` : ''}`
        : '';

      return `<article class="card ${aberto ? 'ativo' : ''}" data-id="${t.id}">
        <div class="card-top">
          <span class="tel">${t.telefone} · ${t.tipos.join(', ')}</span>
          <span class="badge ${badgeClass(t.status)}">${t.status}</span>
        </div>
        <div class="entrada">${t.entrada.replace(/</g, '&lt;')}</div>
        <div class="etapa-meta">${t.etapas.length} etapa(s) · ${fmtMs(dur)} total · id ${t.id}</div>
        ${etapasHtml}
      </article>`;
    }

    async function carregar() {
      try {
        const res = await fetch('/api/pipeline/traces?limite=25');
        const data = await res.json();
        if (res.status === 401 || res.status === 403) {
          pararAutoAtualizacao();
          statusEl.textContent = 'Seu login nao tem acesso a esta area';
          listaEl.innerHTML = '<div class="vazio">Esta area foi bloqueada para o seu perfil</div>';
          return;
        }
        if (!res.ok) throw new Error(data.erro || 'Erro ao carregar pipeline');
        statusEl.textContent = `Build ${data.build} · ${data.total} conversa(s) recente(s) · atualiza a cada 2s`;
        iniciarAutoAtualizacao();
        if (!data.traces?.length) {
          listaEl.innerHTML = '<div class="vazio">Nenhuma mensagem processada ainda. Mande um oi no WhatsApp.</div>';
          return;
        }
        listaEl.innerHTML = data.traces.map((t) => renderTrace(t, t.id === expandido)).join('');
        listaEl.querySelectorAll('.card').forEach((el) => {
          el.addEventListener('click', () => {
            expandido = expandido === el.dataset.id ? null : el.dataset.id;
            carregar();
          });
        });
      } catch (e) {
        statusEl.textContent = e.message;
        listaEl.innerHTML = '';
      }
    }
    atualizarBtn.addEventListener('click', carregar);
    IagmxPainelAuth.boot({
      requiredBlock: 'painel_etapas',
      onReady() {
        carregar();
      },
    });
  </script>
</body>
</html>
